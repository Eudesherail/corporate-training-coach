<div class="shell">
  <header class="topbar" *ngIf="authService.isAuthenticated()">
    <div>
      <h1>Corporate Training Coach</h1>
      <p>Document-grounded onboarding, SOP, and compliance support</p>
    </div>
    <nav>
      <a routerLink="/assistant">Assistant</a>
      <a routerLink="/progress">Progress</a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin">Admin</a>
      <a *ngIf="!authService.isAdmin()" routerLink="/employee">Employee</a>
      <button type="button" (click)="authService.logout()">Sign out</button>
    </nav>
  </header>

  <main class="page">
    <router-outlet></router-outlet>
  </main>
</div>
